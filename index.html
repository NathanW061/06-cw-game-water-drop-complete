<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrapper">
    <h1 class="game-title">Water Drop</h1>
    <!--p class="game-tagline">Catch the good drops, avoid the bad ones!</p-->
    <div class="game-wrapper">
      <div id="game-container">
          <div class="game-overlay" id="start-game-overlay">
            <p>
            Catch the <span class="good-txt">good</span> drops,<br/>avoid the <span class="bad-txt">bad</span> ones!<br/>
                Choose a difficulty&colon;
              </p>
            <br/>
            <button id="start-easy">Easy</button>
            <button id="start-medium">Medium</button>
            <button id="start-hard">Hard</button>
          </div>
          <div class="game-overlay" id="pause-overlay">
            Paused
          </div>
        </div>
        <div id="side-panel">
        <div class="data-row">
          <div class="data-placement">
            <div class="data-field"><span id="score">0</span></div>
            SCORE
          </div>
        </div>
        <div class="data-row">
          <div class="data-placement">
            <div class="data-field"><span id="combo">0</span></div>
            COMBO
          </div>
          <div class="data-placement">
            <div class="data-field"><span id="purity">100</span>%</div>
            PURITY
          </div>
        </div>
        <div class="data-row" id="brand-space">
          <!-- TODO: Insert charity: water branding here -->
           <img class="logo" src="img/cw_logo.png">
        </div>

        <div class="data-row no-mobile">
            <button id="music-toggle">Music: On</button>
            <button id="sound-toggle">Sound: On</button>
        </div>
        
        <button id="pause-btn" class="no-mobile" disabled>Pause Game</button>
        <button id="restart-btn" class="no-mobile" disabled>Restart Game</button>
        <button id="about-btn" class="no-mobile" onclick="window.open('https://www.charitywater.org/', '_blank')">About <b>charity: water</b></button>

        <div class="button-grid mobile">
          <button id="music-toggle-mb" class="mobile-btn"><span class="material-symbols-outlined">music_note</span></button>
          <button id="sound-toggle-mb" class="mobile-btn"><span class="material-symbols-outlined">brand_awareness</span></button>
          <button id="pause-btn-mb" class="mobile-btn" disabled><span class="material-symbols-outlined">pause</span></button>
          <button id="restart-btn-mb" class="mobile-btn" disabled><span class="material-symbols-outlined">replay</span></button>
          <button id="about-btn-mb" class="mobile-btn" onclick="window.open('https://www.charitywater.org/', '_blank')"><img class="logo" src="img/water-can-transparent-trimmed-black.png"></button>
        </div>
        
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
